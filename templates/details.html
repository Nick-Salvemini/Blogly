{% extends 'base.html' %}

{% block title %}{{user.first_name}} Details{% endblock %}

{% block content %}

<div class="details" id="userImg">
    <img src="{{user.image_url}}" alt="Image of {{user.first_name}}">
</div>
<div class="details">
    <h1>{{user.first_name}} {{user.last_name}}</h1>
    <form action="">
        <button id="editButton">Edit {{user.first_name}}</button>
    </form>
    <form action="">
        <button id="deleteButton">Delete {{user.first_name}}</button>
    </form>
    <form action="">
        <button id="homeButton">To Homepage</button>
    </form>



</div>

{% endblock %}
