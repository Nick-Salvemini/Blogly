{% extends 'base.html' %}

{% block title %}Edit a User{% endblock %}

{% block content %}

<h1>Edit a User</h1>

<form action="">
    <label for="firstNameInput">First Name</label>
    <input type="text" name="editFirstNameInput" id="firstNameInput" placeholder="{{user.first_name}}">

    <label for="lastNameInput">Last Name</label>
    <input type="text" name="editLastNameInput" id="lastNameInput" placeholder="{{user.last_name}}">

    <label for="urlInput">Image URL</label>
    <input type="url" name="urlInput" id="editUrlInput" placeholder="{{user.image_url}}">

    <button id="addButton">Add User</button>
</form>

{% endblock %}
